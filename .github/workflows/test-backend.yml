name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secure_pass
          POSTGRES_DB: ai_sales_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f apps/backend/requirements.txt ]; then pip install -r apps/backend/requirements.txt; fi
        pip install pytest httpx ruff black

    - name: Lint with Ruff
      run: |
        ruff check apps/backend

    - name: Format check with Black
      run: |
        black --check apps/backend

    - name: Test with pytest
      env:
        ENV: test
        DATABASE_URL: postgresql://postgres:postgres_secure_pass@localhost:5432/ai_sales_agent_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest apps/backend/tests || echo "No tests written yet"
