name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json

    - name: Install dependencies
      working-directory: apps/frontend
      run: npm ci

    - name: Lint check
      working-directory: apps/frontend
      run: npm run lint

    - name: Build project
      working-directory: apps/frontend
      run: npm run build
